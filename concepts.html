<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - Shahid's Portfolio</title>
    <style>
        body {
            background-color: rgb(18, 18, 19);
            color: rgb(247, 245, 249);
            font-family: "Poppins", sans-serif;
            margin: 0;
            padding: 0;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 90px;
            background-color: rgb(5, 114, 156);
            padding: 0 20px;
        }
        nav .left {
            color: aliceblue;
            font-size: 1.2rem;
            font-weight: bold;
        }
        nav ul {
            display: flex;
            margin: 0;
            padding: 0;
        }
        nav ul li {
            list-style: none;
            margin: 0 15px;
        }
        nav ul li a {
            text-decoration: none;
            color: aliceblue;
            font-size: 1rem;
        }
        nav ul li a.active, nav ul li a:hover {
            color: rgb(12, 12, 20);
            font-size: 1.1rem;
        }
        .content {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin-top: 50px;
            gap: 20px;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }
        .info-container, .form-container {
            flex: 1;
        }
        .info-container {
            padding: 20px;
        }
        .info-container h2 {
            color: rgb(143, 84, 233);
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        .info-container p {
            margin: 5px 0;
            line-height: 1.6;
        }
        .form-container {
            max-width: 500px;
            padding: 20px;
            background-color: #1e1e1f;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .form-container h1 {
            margin-bottom: 10px;
        }
        .form-container input, .form-container textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .form-container button {
            padding: 10px 20px;
            background-color: rgb(5, 114, 156);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .form-container button:hover {
            background-color: rgb(0, 92, 128);
        }
    </style>
</head>
<body>
    <header>
        <nav>

        </nav>
    </header>
    <main>
        <div class="content">
            <div class="info-container">
                <h2>Address</h2>
                <p>Room No. 406 GREEN PEARL Hostel</p>
                <p>SRM Institute of Science and Technology</p>
                <h2>Phone</h2>
                <p>+91 7078161035</p>
                <h2>Email</h2>
                <p>sh6705@srmist.edu.in</p>

            <div class="form-container">

                    <input type="hidden" name="access_key" value="d7a47e1e-5b05-40e3-8158-de1108c4c6f9">
                    <input type="text" name="name" placeholder="Your Name" required>
                    <input type="email" name="email" placeholder="Your Email" required>
                    <input type="text" name="contact" placeholder="Your Contact" required>
                    <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
                    <button type="submit">Submit</button>
                </form>
            </div>
        </div>
    </main>
</body>
