        }
        nav {
            display: flex;

            border-radius: 8px;
            padding: 20px;

            align-items: center;

        .achievement-box img {
            max-width: 150px;
            height: auto;
            border-radius: 8px;
        }
        .achievement-box h3 {
            font-size: 1.2rem;
